<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>팀 회의실</title>
<style>
  :root{
    --paper:#F5F6F8; --card:#FFFFFF; --ink:#1E2430; --ink2:#5B6472; --ink3:#96A0AE;
    --accent:#2B4A73; --accent-soft:#E4EBF4; --accent-line:#BFD0E4;
    --green:#1D6B4C; --green-soft:#E1F0E8;
    --amber:#8A5B14; --amber-soft:#F7ECD8;
    --clay:#A8432E; --clay-soft:#F6E4DF;
    --line:#DDE2E9; --r:10px; font-size:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#14181F; --card:#1C222C; --ink:#E8EBF0; --ink2:#9AA4B2; --ink3:#6B7684;
      --accent:#8FB0D6; --accent-soft:#243447; --accent-line:#33465e;
      --green:#7FC7A0; --green-soft:#1E3329; --amber:#D9A75B; --amber-soft:#3A2E1A;
      --clay:#D98873; --clay-soft:#3B241E; --line:#2A323E; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;line-height:1.6;min-height:100vh}
  .wrap{max-width:880px;margin:0 auto;padding:26px 18px 80px}
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;border-bottom:2px solid var(--accent);padding-bottom:12px;margin-bottom:8px;flex-wrap:wrap}
  header .eyebrow{font-size:11px;letter-spacing:.16em;color:var(--accent);font-weight:700;margin-bottom:2px}
  header h1{font-size:24px;font-weight:700;letter-spacing:-.01em}
  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:999px;padding:8px 15px;font:inherit;font-size:13.5px;font-weight:500;cursor:pointer;transition:transform .12s,background .12s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn.small{padding:5px 11px;font-size:12px}
  .btn.warn{color:var(--clay);border-color:var(--clay-soft);background:transparent}
  .muted{color:var(--ink2);font-size:13px}
  .syncbar{display:flex;align-items:center;gap:8px;justify-content:flex-end;font-size:12px;color:var(--ink2);margin-bottom:16px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--ink3);display:inline-block}
  .dot.ok{background:var(--green)} .dot.syncing{background:var(--amber)} .dot.err{background:var(--clay)}
  .syncbar button{background:none;border:none;color:var(--ink2);font:inherit;font-size:12px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  section{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:14px}
  section h2{font-size:12px;letter-spacing:.08em;color:var(--ink3);font-weight:700;margin-bottom:10px;text-transform:uppercase}
  .status-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .badge{font-size:12px;font-weight:600;border-radius:999px;padding:2px 11px;border:1px solid}
  .badge.가동중{color:var(--green);background:var(--green-soft);border-color:var(--green)}
  .badge.대기{color:var(--amber);background:var(--amber-soft);border-color:var(--amber)}
  .badge.보류{color:var(--ink3);background:var(--card);border-color:var(--ink3)}
  .headline{font-size:14px;color:var(--ink)}
  .chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .qchip{font-size:12px;color:var(--ink2);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .qchip.block{color:var(--clay);border-color:var(--clay-soft)}
  /* 팀 특화 */
  .tiles{display:flex;gap:10px;flex-wrap:wrap}
  .tile{flex:1;min-width:90px;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:center}
  .tile .n{font-size:22px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1.1}
  .tile .lb{font-size:11px;color:var(--ink3);margin-top:2px}
  .track{list-style:none;margin-top:2px}
  .track li{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--paper);font-size:13.5px}
  .track li:last-child{border-bottom:none}
  .track .st{font-size:12px;font-weight:600;border-radius:5px;padding:1px 7px;white-space:nowrap;flex:none}
  .track .st.done{color:var(--green);background:var(--green-soft)}
  .track .st.doing{color:var(--amber);background:var(--amber-soft)}
  .track .st.todo{color:var(--ink3);background:var(--paper);border:1px solid var(--line)}
  .track .pn{font-weight:700;color:var(--accent);min-width:52px;flex:none}
  .idxbar{display:flex;height:16px;border-radius:5px;overflow:hidden;margin-top:4px;border:1px solid var(--line)}
  .idxbar i{display:block;height:100%}
  .idxlegend{display:flex;gap:10px;flex-wrap:wrap;margin-top:7px;font-size:11.5px;color:var(--ink2)}
  .idxlegend span::before{content:'';display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:-1px}
  .prog{margin-top:4px}
  .prog-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .prog-k{font-weight:700;color:var(--accent);min-width:16px;flex:none}
  .prog-name{font-size:13px;color:var(--ink);min-width:120px;flex:none}
  .prog-bar{flex:1;height:8px;background:var(--paper);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .prog-bar i{display:block;height:100%;background:var(--accent)}
  .prog-n{font-size:12px;color:var(--ink3);font-variant-numeric:tabular-nums;flex:none;min-width:34px;text-align:right}
  .kv{font-size:13px;color:var(--ink2);margin-top:6px}
  .kv b{color:var(--ink);font-weight:600}
  .gitclean{color:var(--green)} .gitdirty{color:var(--clay)}
  .actbtns{display:flex;gap:7px;flex-wrap:wrap}
  button.act{font:inherit;font-size:12.5px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:999px;padding:5px 12px;cursor:pointer}
  button.act:hover{background:var(--accent);color:#fff}
  .item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px;flex-wrap:wrap;border-bottom:1px solid var(--paper)}
  .item:last-of-type{border-bottom:none}
  .item input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex:none}
  .item.done label{color:var(--ink3);text-decoration:line-through}
  .item label{cursor:pointer;flex:1;min-width:120px}
  .item-modes{display:flex;gap:4px;flex:none;margin-left:auto}
  .imode{border:1px solid var(--line);background:var(--paper);color:var(--ink2);border-radius:999px;padding:3px 9px;font:inherit;font-size:11px;cursor:pointer;white-space:nowrap}
  .imode:hover{border-color:var(--accent);color:var(--ink)}
  .imode.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .item .x{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:0 4px;flex:none}
  .item .x:hover{color:var(--clay)}
  .ipanel{flex-basis:100%;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:2px}
  .ipanel textarea{width:100%;min-height:52px;border:1px solid var(--line);border-radius:6px;padding:7px 9px;font:inherit;font-size:13px;background:var(--card);color:var(--ink);resize:vertical}
  .ipanel textarea:focus{outline:none;border-color:var(--accent)}
  .ipanel-act{display:flex;align-items:center;gap:10px;margin-top:6px;flex-wrap:wrap}
  .idetail{flex-basis:100%;font-size:12.5px;color:var(--ink2);border-left:2px solid var(--accent-line);padding:4px 10px;margin-top:2px;white-space:pre-wrap}
  .reqchip{display:inline-block;font-size:10.5px;font-weight:600;border-radius:999px;padding:1px 8px;white-space:nowrap;flex:none}
  .reqchip.new,.reqchip.running{color:var(--amber);background:var(--amber-soft)}
  .reqchip.dispatched,.reqchip.queued,.reqchip.seen{color:var(--accent);background:var(--accent-soft)}
  .reqchip.user{color:var(--clay);background:var(--clay-soft)}
  .reqchip.done{color:var(--green);background:var(--green-soft)}
  .addrow{display:flex;gap:8px;margin-top:10px}
  .addrow input{flex:1;border:1px solid var(--line);border-radius:6px;padding:7px 10px;font:inherit;font-size:13.5px;background:var(--paper);color:var(--ink)}
  .addrow input:focus{outline:none;border-color:var(--accent)}
  .notes textarea{width:100%;min-height:90px;border:none;background:transparent;font:inherit;font-size:14px;resize:vertical;color:var(--ink)}
  .notes textarea:focus{outline:none}
  .docbtns{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-size:13px;padding:9px 18px;border-radius:999px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9}
  .toast.show{opacity:1}
  .foot{font-size:12px;color:var(--ink3);margin-top:6px}
  .foot a{color:var(--accent)}
  dialog{border:1px solid var(--line);border-radius:12px;padding:22px;max-width:440px;width:92%;font-family:inherit;background:var(--card);color:var(--ink)}
  dialog::backdrop{background:rgba(20,24,31,.45)}
  dialog h3{font-size:17px;margin-bottom:14px}
  dialog .f{margin-bottom:12px}
  dialog .f label{display:block;font-size:13px;color:var(--ink2);margin-bottom:4px}
  dialog .f input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit;font-size:14px;background:var(--card);color:var(--ink)}
  dialog .hint{font-size:12px;color:var(--ink3);margin-top:3px}
  dialog .dact{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
  @media (max-width:560px){ header h1{font-size:20px} .item-modes{margin-left:0} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="eyebrow" id="eyebrow">AI COMPANY · TEAM ROOM</div>
      <h1 id="title">팀 회의실</h1>
    </div>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
      <a class="btn ghost" href="https://jtthw64-create.github.io/ai-company-dashboard/" title="상위: AI 컴퍼니 상황판">🏢 컴퍼니 상황판</a>
      <button class="btn ghost" onclick="openSettings()">동기화 설정</button>
      <button class="btn" onclick="fullSync(true)">새로고침</button>
    </div>
  </header>
  <div class="syncbar">
    <span class="dot" id="syncDot"></span><span id="syncText">로컬 모드</span>
    <span id="genAt"></span>
  </div>
  <div id="app"></div>
  <div class="foot" id="foot"></div>
</div>
<div class="toast" id="toast"></div>

<dialog id="setDlg">
  <h3>동기화 설정</h3>
  <div class="f"><label>GitHub 토큰 (gist 권한)</label><input id="sToken" type="password" placeholder="ghp_… 또는 github_pat_…">
    <div class="hint">이 브라우저 localStorage에만 저장됩니다. 저장소·gist에 기록 금지.</div></div>
  <div class="hint">gist ID는 회의실마다 코드에 고정되어 있습니다 (팀 데이터 + 컴퍼니 접수함 공용 토큰).</div>
  <div class="dact"><button class="btn ghost" onclick="document.getElementById('setDlg').close()">닫기</button>
    <button class="btn" onclick="saveSettings()">저장 후 동기화</button></div>
</dialog>

<script>
/* ===== 팀 설정 (base 공통 — 특화는 이후 팀별 확장) ===== */
const TEAMS={
  dev:{name:'개발팀 회의실', accent:'#2B4A73', accentSoft:'#E4EBF4', ledger:'프로젝트 레지스트리 (eBookshelf/Hubrary·VoiceReading)',
    actions:[{a:'dev.verify',l:'run-verify 검증'},{a:'dev.implement',l:'지금 구현',w:'now'},{a:'dev.implement',l:'새벽 5시 구현',w:'0500'}]},
  research:{name:'연구팀 회의실', accent:'#1D6B4C', accentSoft:'#E1F0E8', ledger:'학술 파이프라인 (inbox·master_index·위키)',
    actions:[{a:'research.batch',l:'배치 실행'},{a:'research.reports',l:'보고서 배치'},{a:'research.index',l:'인덱스 점검'},{a:'research.wiki',l:'위키 노트 소급'}]},
  business:{name:'사업팀 회의실', accent:'#8A5B14', accentSoft:'#F7ECD8', ledger:'Hubrary 출시 준비 + 사업 리서치',
    actions:[{a:'biz.launch',l:'출시 체크 갱신'},{a:'biz.research',l:'리서치(주제 입력)',needsText:true}]}
};
const COMPANY_GIST_ID='b46a4393b6255a460fa29b94ccbfa83f';
const COMPANY_GIST_FILE='company-status.json';
const ROOMS_GIST_ID='3a20580d8a6391157c3bc52ca62f4dc1';
const ROOMS_GIST_FILE='company-teamrooms.json';
const CONFIG_KEY='ai-company-teamroom-config-v1';
const POLL_MS=60000;
const REQ_LABEL={new:'접수',running:'실행 중',dispatched:'실행 예약',queued:'정기 회차 대기',seen:'확인',user:'사용자 실행',done:'완료'};

const TEAM=(new URLSearchParams(location.search).get('team')||'dev');
const CFG=TEAMS[TEAM]||TEAMS.dev;
document.documentElement.style.setProperty('--accent',CFG.accent);
document.documentElement.style.setProperty('--accent-soft',CFG.accentSoft);
document.getElementById('title').textContent=CFG.name;
document.title=CFG.name;

let config={}, room={items:[],notes:'',updatedAt:'',rev:0}, companyTeam=null, companyReqMap={}, roomsData=null;
let pushTimer=null, pollTimer=null, panel={}, busy=false;

function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function isEditing(){const a=document.activeElement;return !!a&&['INPUT','TEXTAREA'].includes(a.tagName);}
function loadConfig(){try{config=JSON.parse(localStorage.getItem(CONFIG_KEY))||{};}catch(e){config={};}}
function saveConfig(){try{localStorage.setItem(CONFIG_KEY,JSON.stringify(config));}catch(e){}}
function openSettings(){loadConfig();
  let tok=config.token||'';
  if(!tok){try{const cc=JSON.parse(localStorage.getItem('ai-company-config-v1'))||{};if(cc.token)tok=cc.token;}catch(e){}}
  document.getElementById('sToken').value=tok;document.getElementById('setDlg').showModal();}
function saveSettings(){config.token=document.getElementById('sToken').value.trim();saveConfig();document.getElementById('setDlg').close();fullSync(true);}
function ghHeaders(json){const h={Accept:'application/vnd.github+json'};if(config.token)h.Authorization='Bearer '+config.token;if(json)h['Content-Type']='application/json';return h;}
function setSync(mode,msg){const d=document.getElementById('syncDot'),t=document.getElementById('syncText');
  d.className='dot '+(mode==='ok'?'ok':mode==='syncing'?'syncing':mode==='err'?'err':'');
  t.textContent=mode==='ok'?'동기화됨':mode==='syncing'?'저장 중…':mode==='err'?('오류'+(msg?' — '+msg:'')):'로컬 모드';}

async function gistGet(id,file){
  const r=await fetch('https://api.github.com/gists/'+id,{headers:ghHeaders()});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const j=await r.json();const f=j.files&&j.files[file];if(!f) return {json:null,files:j.files};
  let c=f.content; if(f.truncated){const rr=await fetch(f.raw_url);c=await rr.text();}
  return {json:JSON.parse(c),files:j.files};
}
async function pullCompany(){
  if(!config.token) return;
  try{
    const {json}=await gistGet(COMPANY_GIST_ID,COMPANY_GIST_FILE);
    if(!json) return;
    companyTeam=(json.teams||[]).find(t=>t.id===TEAM)||null;
    const m={};(json.requests||[]).forEach(r=>m[r.id]={status:r.status,result:r.result});companyReqMap=m;
    if(json.generatedAt)document.getElementById('genAt').textContent='· 회사 상태 '+fmtAt(json.statusRefreshedAt||json.generatedAt);
  }catch(e){}
}
async function pullRoom(){
  if(!config.token) return;
  try{
    const {json}=await gistGet(ROOMS_GIST_ID,ROOMS_GIST_FILE);
    if(!json) return; roomsData=json;
    const r=(json.rooms&&json.rooms[TEAM])||{items:[],notes:'',updatedAt:'',rev:0};
    if((r.updatedAt||'')>=(room.updatedAt||'')) room=r;
  }catch(e){}
}
async function fullSync(manual){
  if(!config.token){setSync('local');render();if(manual)openSettings();return;}
  if(busy)return; busy=true; setSync('syncing');
  try{ await pullRoom(); await pullCompany(); setSync('ok'); if(!isEditing())render(); }
  catch(e){ setSync('err',e.message);} busy=false;
}
function schedulePush(){
  cacheWrite();
  if(!config.token){setSync('local');return;}
  setSync('syncing'); clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{
      const {json}=await gistGet(ROOMS_GIST_ID,ROOMS_GIST_FILE);
      const data=json||{version:1,rooms:{},deletedIds:[]};
      data.rooms=data.rooms||{};
      const remote=data.rooms[TEAM];
      /* 팀 단위 last-write-wins: 내 room이 더 최신이면 채택 */
      if(!remote||(room.updatedAt||'')>=(remote.updatedAt||'')) data.rooms[TEAM]=room;
      else { room=remote; }
      data.updatedAt=nowKST();
      await fetch('https://api.github.com/gists/'+ROOMS_GIST_ID,{method:'PATCH',headers:ghHeaders(true),
        body:JSON.stringify({files:{[ROOMS_GIST_FILE]:{content:JSON.stringify(data,null,1)}}})});
      setSync('ok'); if(!isEditing())render();
    }catch(e){setSync('err',e.message);}
    pushTimer=null;
  },1000);
}
function touch(){room.updatedAt=nowKST();room.rev=(room.rev||0)+1;}
function cacheWrite(){try{localStorage.setItem('teamroom-'+TEAM,JSON.stringify(room));}catch(e){}}
function cacheRead(){try{const v=localStorage.getItem('teamroom-'+TEAM);if(v)room=JSON.parse(v);}catch(e){}}
function fmtAt(iso){if(!iso)return'';try{const d=new Date(iso);return (d.getMonth()+1)+'-'+String(d.getDate()).padStart(2,'0')+' '+d.toTimeString().slice(0,5);}catch(e){return'';}}
/* KST 통일(2026-07-12): 저장도 +09:00 오프셋 ISO로 — 원본 데이터를 직접 봐도 한국시간. 표시(fmtAt)는 원래 로컬 렌더라 그대로. */
function nowKST(){ return new Date(Date.now()+9*3600e3).toISOString().replace('Z','+09:00'); }

/* ===== 실행 요청 (회사 접수함으로 제출) ===== */
async function sendRequest(text,action,when){
  if(!config.token){toast('먼저 동기화 설정에서 토큰을 입력해 주세요');openSettings();return null;}
  const id='r-'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  const now=nowKST();
  try{
    const {json}=await gistGet(COMPANY_GIST_ID,COMPANY_GIST_FILE);
    if(!json)throw new Error('company gist 없음');
    json.requests=json.requests||[];
    const req={id,at:now,team:TEAM,action:action||'free',text,status:'new',updatedAt:now};
    if(when)req.when=when;
    json.requests.push(req);
    const r=await fetch('https://api.github.com/gists/'+COMPANY_GIST_ID,{method:'PATCH',headers:ghHeaders(true),
      body:JSON.stringify({files:{[COMPANY_GIST_FILE]:{content:JSON.stringify(json,null,1)}}})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    companyReqMap[id]={status:'new'};
    return id;
  }catch(e){toast('요청 전송 실패: '+e.message);return null;}
}
function reqChip(id){if(!id)return'';const r=companyReqMap[id];const st=r?r.status:'new';
  return `<span class="reqchip ${esc(st)}"${r&&r.result?` title="${esc(r.result)}"`:''}>${esc(REQ_LABEL[st]||st)}</span>`;}

async function presetAction(a,when,needsText){
  let text=a;
  if(needsText){const inp=document.getElementById('presetText');text=(inp&&inp.value||'').trim();if(!text){toast('주제·내용을 입력해 주세요');return;}}
  const id=await sendRequest(needsText?`[${TEAM}] ${a}: ${text}`:`[${TEAM}] ${a}${when?' ('+when+')':''}`,a,when);
  if(id){toast('실행 요청 전송 — 회사 접수함에서 처리됩니다');if(needsText){const inp=document.getElementById('presetText');if(inp)inp.value='';}render();}
}

/* ===== 액션 아이템 3분기 ===== */
function togglePanel(i,mode){const k=String(i);panel[k]=(panel[k]===mode)?null:mode;render();}
function toggleItem(i){room.items[i].done=!room.items[i].done;touch();schedulePush();render();}
function addItem(inp){const v=inp.value.trim();if(!v)return;room.items.push({text:v,done:false,detail:'',requestId:'',requestText:''});inp.value='';touch();schedulePush();render();}
function rmItem(i){room.items.splice(i,1);touch();schedulePush();render();}
async function submitExec(i){const k=String(i);const ta=document.getElementById('exec_'+k);const text=(ta&&ta.value||'').trim();
  if(!text){toast('실행할 내용을 입력해 주세요');return;}
  const it=room.items[i];
  const id=await sendRequest(`[${CFG.name}] "${it.text}" — ${text}`,'free');
  if(!id)return;
  it.requestId=id;it.requestText=text;touch();schedulePush();panel[k]=null;render();
  toast('실행 요청을 보냈습니다 — 회사 접수함에서 확인됩니다');}
function submitDetail(i,v){room.items[i].detail=v;touch();schedulePush();}

/* ===== 팀 특화 카드 (디스패처가 company gist teams[].room에 실어준 데이터) ===== */
function renderSpecial(){
  const R=companyTeam&&companyTeam.room;
  if(!R) return `<section><h2>${esc(CFG.name.replace(' 회의실',''))} 특화</h2><div class="muted">정기 회차(04·18·23시) 또는 [새로고침] 후 표시됩니다. 담당 원장: ${esc(CFG.ledger)}</div></section>`;
  if(TEAM==='dev'){
    const track=(R.deployTrack||[]).map(p=>{
      const st=p.status==='done'?'done':p.status==='doing'?'doing':'todo';
      const lb=st==='done'?'완료':st==='doing'?'진행':'대기';
      return `<li><span class="pn">P${esc(p.n)}</span><span class="st ${st}">${lb}</span><span>${esc(p.label)}</span></li>`;
    }).join('');
    return `<section><h2>배포 트랙 · eBookshelf</h2>
      <ul class="track">${track||'<li class="muted">트랙 정보 없음</li>'}</ul>
      <div class="kv">다음: <b>${esc(R.nextPhase||'-')}</b></div>
      <div class="kv">최근 커밋: <b>${esc(R.lastCommit||'-')}</b> · 워킹트리 <span class="${R.gitDirty?'gitdirty':'gitclean'}">${R.gitDirty?'변경 있음(dirty)':'clean'}</span></div>
    </section>`;
  }
  if(TEAM==='research'){
    const x=R.index||{};
    const total=x.total||((x['미독']||0)+(x['보고서만']||0)+(x['정독']||0)+(x['인용됨']||0))||1;
    const seg=(k,c)=>{const v=x[k]||0;return v?`<i style="width:${v/total*100}%;background:${c}" title="${k} ${v}"></i>`:'';};
    return `<section><h2>연구 파이프라인</h2>
      <div class="tiles">
        <div class="tile"><div class="n">${R.inbox||0}</div><div class="lb">inbox 대기</div></div>
        <div class="tile"><div class="n">${R.failed||0}</div><div class="lb">99_failed</div></div>
        <div class="tile"><div class="n">${total}</div><div class="lb">인덱스 문헌</div></div>
        <div class="tile"><div class="n">${R.lock?'🔒':'—'}</div><div class="lb">배치 lock</div></div>
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--ink3);font-weight:700">읽기 상태</div>
      <div class="idxbar">${seg('미독','#96A0AE')}${seg('보고서만','#D9A75B')}${seg('정독','#5A9')}${seg('인용됨','#1D6B4C')}</div>
      <div class="idxlegend">
        <span style="--_c">미독 ${x['미독']||0}</span><span>보고서만 ${x['보고서만']||0}</span><span>정독 ${x['정독']||0}</span><span>인용됨 ${x['인용됨']||0}</span>
      </div>
      <div class="docbtns" style="margin-top:10px"><a class="btn ghost small" href="obsidian://open?vault=LLM%20WIKI" title="Obsidian LLM WIKI 열기">📚 LLM WIKI 열기</a></div>
    </section>`;
  }
  if(TEAM==='business'){
    const rows=(R.sections||[]).map(s=>{
      const pct=s.total?Math.round(s.done/s.total*100):0;
      return `<div class="prog-row"><span class="prog-k">${esc(s.k)}</span><span class="prog-name">${esc(s.name)}</span><span class="prog-bar"><i style="width:${pct}%"></i></span><span class="prog-n">${s.done}/${s.total}</span></div>`;
    }).join('');
    const next=(R.next||[]).map(n=>`<span class="qchip">${esc(n)}</span>`).join('');
    return `<section><h2>Hubrary 출시 체크리스트</h2>
      <div class="prog">${rows||'<div class="muted">체크리스트 정보 없음</div>'}</div>
      ${next?`<div style="margin-top:10px;font-size:12px;color:var(--ink3);font-weight:700">다음 액션</div><div class="chiprow">${next}</div>`:''}
    </section>`;
  }
  return '';
}

/* ===== 렌더 ===== */
function render(){
  const app=document.getElementById('app');
  let h='';
  /* 팀 상태 */
  h+='<section><h2>팀 현황 (회사 상태 기준)</h2>';
  if(companyTeam){
    h+=`<div class="status-head"><span class="badge ${esc(companyTeam.badge||'대기')}">${esc(companyTeam.badge||'대기')}</span>
      <span class="headline">${esc(companyTeam.headline||'')}</span></div>`;
    const q=(companyTeam.queue||[]).map(x=>`<span class="qchip">${esc(x)}</span>`).join('');
    const b=(companyTeam.blockers||[]).map(x=>`<span class="qchip block">👤 ${esc(x)}</span>`).join('');
    if(q||b)h+=`<div class="chiprow">${q}${b}</div>`;
  } else h+=`<div class="muted">회사 상태 미연결 — [동기화 설정]에서 토큰 입력 후 [새로고침]. 담당 원장: ${esc(CFG.ledger)}</div>`;
  h+='</section>';
  /* 팀 특화 카드 */
  h+=renderSpecial();
  /* 바로 실행 */
  h+='<section><h2>바로 실행 (회사 접수함 → 자동 처리)</h2><div class="actbtns">';
  CFG.actions.forEach(x=>{h+=`<button class="act" onclick="presetAction('${x.a}',${x.w?`'${x.w}'`:'null'},${x.needsText?'true':'false'})">${esc(x.l)}</button>`;});
  h+='</div>';
  if(CFG.actions.some(x=>x.needsText))h+=`<div class="addrow"><input id="presetText" placeholder="리서치 주제 등 입력 후 위 버튼"></div>`;
  h+='</section>';
  /* 액션 아이템 */
  h+='<section><h2>회의 안건 · 액션 아이템</h2>';
  room.items.forEach((it,i)=>{
    const k=String(i);const p=panel[k];
    h+=`<div class="item ${it.done?'done':''}">
      <input type="checkbox" ${it.done?'checked':''} onchange="toggleItem(${i})">
      <label>${esc(it.text)}</label>
      <div class="item-modes">
        <button class="imode ${it.done?'active':''}" onclick="toggleItem(${i})">완료 확인</button>
        <button class="imode ${p==='exec'?'active':''}" onclick="togglePanel(${i},'exec')">실행 요청 업무</button>
        <button class="imode ${p==='detail'?'active':''}" onclick="togglePanel(${i},'detail')">내용 업데이트</button>
      </div>
      ${reqChip(it.requestId)}
      <button class="x" title="삭제" onclick="rmItem(${i})">✕</button>
      ${p==='exec'?`<div class="ipanel"><textarea id="exec_${k}" placeholder="실행할 작업을 자연어로 입력…">${esc(it.requestText||'')}</textarea>
        <div class="ipanel-act"><button class="btn small" onclick="submitExec(${i})">요청 보내기</button><span class="muted">회사 접수함으로 전달·실행</span></div></div>`:''}
      ${p==='detail'?`<div class="ipanel"><textarea id="detail_${k}" placeholder="이 항목의 추가 상세 내용…" oninput="submitDetail(${i},this.value)">${esc(it.detail||'')}</textarea></div>`:''}
      ${(!p&&it.detail)?`<div class="idetail">${esc(it.detail)}</div>`:''}
    </div>`;
  });
  h+=`<div class="addrow"><input placeholder="안건·할 일 추가 후 Enter" onkeydown="if(event.key==='Enter')addItem(this)"></div></section>`;
  /* 메모 */
  h+=`<section class="notes"><h2>회의 메모</h2><textarea placeholder="회의 결정·확인 필요 항목을 자유롭게 기록 (자동 저장)" oninput="room.notes=this.value;touch();schedulePush()">${esc(room.notes||'')}</textarea></section>`;
  app.innerHTML=h;
  document.getElementById('foot').innerHTML=`${esc(CFG.name)} — 실행 요청은 회사 접수함으로 전달돼 몇 분 내 처리(안전 판정 통과 시). 상위: <a href="https://jtthw64-create.github.io/ai-company-dashboard/">컴퍼니 상황판</a> · 사역: <a href="https://jtthw64-create.github.io/ai-company-dashboard/ministry-room.html">사역팀 회의실</a>`;
}

function startPolling(){clearInterval(pollTimer);pollTimer=setInterval(()=>{if(document.visibilityState==='visible'&&!pushTimer){pullRoom();pullCompany().then(()=>{if(!isEditing())render();});}},POLL_MS);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')fullSync(false);});}
function load(){loadConfig();cacheRead();render();
  if(config.token){fullSync(false);startPolling();}else setSync('local');}
load();
</script>
</body>
